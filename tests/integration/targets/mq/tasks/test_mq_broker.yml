---
- name: MQ User test suite
  hosts: dummy
  gather_facts: false
  vars:
    broker_name: "{{ lookup('env', 'MQ_BROKER_NAME') | default('mq_broker_ci') }}"
    broker_sg_ids: "{{ lookup('env', 'MQ_SG_IDS') | default('') }}"
    broker_subnet_ids: "{{ lookup('env', 'MQ_SUBNET_IDS') | default('') }}"
    aws_access_key_id: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
    aws_secret_access_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
    aws_session_token: "{{ lookup('env', 'AWS_SESSION_TOKEN') }}"
    aws_region: "{{ lookup('env', 'AWS_REGION') }}"


  tasks:
    - name: show env
      debug:
        msg: "Will run tests against broker '{{ broker_name }}' in AWS region '{{ aws_region }}'"
    - name: create broker with minimal parameters
      # amazon.aws.mq_broker:
      mq_broker:
        broker_name: "{{ broker_name }}"
        region: "{{ aws_region }}"
        security_groups: "{{ broker_sg_ids.split(',') }}"
        subnet_ids: "{{ broker_subnet_ids.split(',') }}"
        aws_access_key: "{{ aws_access_key_id }}"
        aws_secret_key: "{{ aws_secret_access_key }}"
        security_token: "{{ aws_session_token }}"
      register: result
    - set_fact:
        broker_id: "{{ result.broker['BrokerId'] }}"
    - name: get broker details by id
      # amazon.aws.mq_broker_info:
      mq_broker_info:
        broker_id: "{{ broker_id }}"
        region: "{{ aws_region }}"
        aws_access_key: "{{ aws_access_key_id }}"
        aws_secret_key: "{{ aws_secret_access_key }}"
        security_token: "{{ aws_session_token }}"
      register: result_c1
    - name: verify creation result
      #ansible.builtin.assert:
      assert:
        fail_msg: broker creation failed
        that:
        # change state is from previous operation:
          - ( result.changed | bool )
          - result_c1.broker['BrokerId'] == broker_id
          - result_c1.broker['BrokerName'] == broker_name
          - result_c1.broker['BrokerState'] == 'CREATION_IN_PROGRESS'
          - ( result_c1.broker['StorageType'] | upper ) == 'EFS'
      when: not ansible_check_mode
    - debug:
        msg: "Wait until broker {{ broker_name }} ({{ broker_id }}) enters running state. This may take several minutes"
    - name: wait for startup
      # amazon.aws.mq_broker_info:
      mq_broker_info:
        broker_id:      "{{ broker_id }}"
        region:         "{{ aws_region }}"
        aws_access_key: "{{ aws_access_key_id }}"
        aws_secret_key: "{{ aws_secret_access_key }}"
        security_token: "{{ aws_session_token }}"
      register: result
      until: result.broker['BrokerState'] == 'RUNNING'
      retries: 15
      delay:   60
      when: not ansible_check_mode
    - name: repeat creation
      # amazon.aws.mq_broker:
      mq_broker:
        broker_name: "{{ broker_name }}"
        region: "{{ aws_region }}"
        security_groups: "{{ broker_sg_ids.split(',') }}"
        subnet_ids: "{{ broker_subnet_ids.split(',') }}"
        aws_access_key: "{{ aws_access_key_id }}"
        aws_secret_key: "{{ aws_secret_access_key }}"
        security_token: "{{ aws_session_token }}"
      register: result
    - set_fact:
        broker_id: "{{ result.broker['BrokerId'] }}"
    - name: get broker details - this time by name
      # amazon.aws.mq_broker_info:
      mq_broker_info:
        broker_name: "{{ broker_name }}"
        region: "{{ aws_region }}"
        aws_access_key: "{{ aws_access_key_id }}"
        aws_secret_key: "{{ aws_secret_access_key }}"
        security_token: "{{ aws_session_token }}"
      register: result_c2
    - name: verify broker re-creation
      #ansible.builtin.assert:
      assert:
        fail_msg: broker re-creation failed
        that:
        # change state is from previous operation:
        - not ( result.changed | bool)
        - result_c2.broker['BrokerId'] == broker_id
        - result_c2.broker['BrokerName'] == broker_name
        - ( result_c2.broker['StorageType'] | upper ) == 'EFS'
      when: not ansible_check_mode
    - name: update broker
      # amazon.aws.mq_broker:
      mq_broker:
        broker_name: "{{ broker_name }}"
        region:          "{{ aws_region }}"
        auto_minor_version_upgrade: false
        storage_type: EBS
        aws_access_key:  "{{ aws_access_key_id }}"
        aws_secret_key:  "{{ aws_secret_access_key }}"
        security_token: "{{ aws_session_token }}"
      register: result
    - name: verify broker update
      #ansible.builtin.assert:
      assert:
        fail_msg: broker update failed
        that:
        - ( result.changed | bool)
        - result.broker['BrokerId'] == broker_id
      when: not ansible_check_mode
    - name: reboot broker to make pending changes active
      # amazon.aws.mq_broker:
      mq_broker:
        broker_name: "{{ broker_name }}"
        state: "restarted"
        region: "{{ aws_region }}"
        aws_access_key: "{{ aws_access_key_id }}"
        aws_secret_key: "{{ aws_secret_access_key }}"
        security_token: "{{ aws_session_token }}"
      register: result
    - name: get broker details by id
      # amazon.aws.mq_broker_info:
      mq_broker_info:
        broker_id: "{{ broker_id }}"
        region: "{{ aws_region }}"
        aws_access_key: "{{ aws_access_key_id }}"
        aws_secret_key: "{{ aws_secret_access_key }}"
        security_token: "{{ aws_session_token }}"
      register: result_r1
    - name: check for pending reboot
      #ansible.builtin.assert:
      assert:
        fail_msg: trigger reboot failed
        that:
          - result.changed | bool
          - result_r1.broker['BrokerState'] == 'REBOOT_IN_PROGRESS'
      when: not ansible_check_mode
    - debug:
        msg: "Wait until reboot of broker {{ broker_name }} ({{ broker_id }}) is finished. This may take several minutes"
    - name: wait for reboot
      # amazon.aws.mq_broker_info:
      mq_broker_info:
        broker_id:      "{{ broker_id }}"
        region:         "{{ aws_region }}"
        aws_access_key: "{{ aws_access_key_id }}"
        aws_secret_key: "{{ aws_secret_access_key }}"
        security_token: "{{ aws_session_token }}"
      register: result
      until: result.broker['BrokerState'] == 'RUNNING'
      retries: 15
      delay:   60
      when: not ansible_check_mode
    - name: get details after update
      # amazon.aws.mq_broker_info:
      mq_broker_info:
        broker_name: "{{ broker_name }}"
        region: "{{ aws_region }}"
        aws_access_key: "{{ aws_access_key_id }}"
        aws_secret_key: "{{ aws_secret_access_key }}"
        security_token: "{{ aws_session_token }}"
      register: result_u1
    - name: verify broker update
      #ansible.builtin.assert:
      assert:
        fail_msg: broker update failed
        that:
        - result_u1.broker['BrokerId'] == broker_id
        - result_u1.broker['BrokerName'] == broker_name
        - not ( result_u1.broker['AutoMinorVersionUpgrade'] | bool )
        # the next one checks that changes to create-only parameters are silently ignore
        - result_u1.broker['StorageType'] == result_c1.broker['StorageType']
      when: not ansible_check_mode
    - name: repeat update broker
      # amazon.aws.mq_broker:
      mq_broker:
        broker_name: "{{ broker_name }}"
        region:          "{{ aws_region }}"
        auto_minor_version_upgrade: false
        storage_type: EBS
        aws_access_key:  "{{ aws_access_key_id }}"
        aws_secret_key:  "{{ aws_secret_access_key }}"
        security_token: "{{ aws_session_token }}"
      register: result
    - name: get details after re-update
      # amazon.aws.mq_broker_info:
      mq_broker_info:
        broker_name: "{{ broker_name }}"
        region: "{{ aws_region }}"
        aws_access_key: "{{ aws_access_key_id }}"
        aws_secret_key: "{{ aws_secret_access_key }}"
        security_token: "{{ aws_session_token }}"
      register: result_u2
    - name: verify broker re-update
      #ansible.builtin.assert:
      assert:
        fail_msg: broker update failed
        that:
        - not ( result.changed | bool)
        - result_u2.broker['BrokerId'] == result_u1.broker['BrokerId']
        - result_u2.broker['StorageType'] == result_u1.broker['StorageType']
        - result_u2.broker['EngineVersion'] == result_u1.broker['EngineVersion']
      when: not ansible_check_mode
    # here we can put in tests for mq_broker_config
    - name: delete broker
      # amazon.aws.mq_broker:
      mq_broker:
        broker_name: "{{ broker_name }}"
        state: "absent"
        region: "{{ aws_region }}"
        aws_access_key: "{{ aws_access_key_id }}"
        aws_secret_key: "{{ aws_secret_access_key }}"
        security_token: "{{ aws_session_token }}"
      register: result
    - name: verify broker delete
      #ansible.builtin.assert:
      assert:
        fail_msg: broker delete failed
        that:
        - ( result.changed | bool)
      when: not ansible_check_mode
    - name: get details after delete
      # amazon.aws.mq_broker_info:
      mq_broker_info:
        broker_name: "{{ broker_name }}"
        region: "{{ aws_region }}"
        aws_access_key: "{{ aws_access_key_id }}"
        aws_secret_key: "{{ aws_secret_access_key }}"
        security_token: "{{ aws_session_token }}"
      register: result_d1
    - name: verify broker deletion on progress
      #ansible.builtin.assert:
      assert:
        fail_msg: broker delete too fast?
        that:
        - result_d1.broker['BrokerState'] == 'DELETION_IN_PROGRESS'
      when: not ansible_check_mode
    - name: repeat broker deletion
      # amazon.aws.mq_broker:
      mq_broker:
        broker_name: "{{ broker_name }}"
        state: "absent"
        region: "{{ aws_region }}"
        aws_access_key: "{{ aws_access_key_id }}"
        aws_secret_key: "{{ aws_secret_access_key }}"
        security_token: "{{ aws_session_token }}"
      register: result
    - name: verify broker repeated delete
      #ansible.builtin.assert:
      assert:
        fail_msg: didn't detect DELETION_IN_PROGRESS in progress
        that:
        - not ( result.changed | bool)
      when: not ansible_check_mode
    - name: deletion unknown broker - simulates re-deletion of completely deleted broker
      # amazon.aws.mq_broker:
      mq_broker:
        broker_name: "{{ broker_name }}__unknown_broker__"
        state: "absent"
        region: "{{ aws_region }}"
        aws_access_key: "{{ aws_access_key_id }}"
        aws_secret_key: "{{ aws_secret_access_key }}"
        security_token: "{{ aws_session_token }}"
      register: result
    - name: verify delete unknown broker
      #ansible.builtin.assert:
      assert:
        fail_msg: deletion of unknown broker return unexpected result
        that:
        - not ( result.changed | bool)
      when: not ansible_check_mode

