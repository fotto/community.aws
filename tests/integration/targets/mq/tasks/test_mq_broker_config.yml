---
- name: MQ User test suite
  hosts: dummy
  gather_facts: false
  module_defaults:
    mq_broker:
      aws_access_key: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
      aws_secret_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
      security_token: "{{ lookup('env', 'AWS_SESSION_TOKEN') | default('omit') }}"
      aws_region: "{{ lookup('env', 'AWS_REGION') }}"
    mq_broker_info:
      aws_access_key: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
      aws_secret_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
      security_token: "{{ lookup('env', 'AWS_SESSION_TOKEN') | default('omit') }}"
      aws_region: "{{ lookup('env', 'AWS_REGION') }}"
    mq_broker_config:
      aws_access_key: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
      aws_secret_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
      security_token: "{{ lookup('env', 'AWS_SESSION_TOKEN') | default('omit') }}"
      aws_region: "{{ lookup('env', 'AWS_REGION') }}"
  vars:
    broker_name: "{{ lookup('env', 'MQ_BROKER_NAME') }}"
    broker_sg_ids: "{{ lookup('env', 'MQ_SG_IDS') | default('') }}"
    broker_subnet_ids: "{{ lookup('env', 'MQ_SUBNET_IDS') | default('') }}"

  tasks:
  - block:
    - name: show env
      debug:
        msg: "Will run tests against broker '{{ broker_name }}'"
    - name: create broker for config tests
      # amazon.aws.mq_broker:
      mq_broker:
        broker_name: "{{ broker_name }}"
        security_groups: "{{ broker_sg_ids.split(',') }}"
        subnet_ids: "{{ broker_subnet_ids.split(',') }}"
      register: result
    - set_fact:
        broker_id: "{{ result.broker['BrokerId'] }}"
    - debug:
        msg: "Wait until broker {{ broker_name }} ({{ broker_id }}) enters running state. This may take several minutes"
    - name: wait for startup
      # amazon.aws.mq_broker_info:
      mq_broker_info:
        broker_id:      "{{ broker_id }}"
      register: result
      until: result.broker['BrokerState'] == 'RUNNING'
      retries: 15
      delay:   60
      when: not ansible_check_mode
    - name: test 1 - send update to broker config
      # amazon.aws.mq_broker:
      mq_broker_config:
        broker_id: "{{ broker_id }}"
        config_xml: "{{ lookup('file', '../files/broker_cfg.1.xml')}}"
      register: result
    - name: verify test1
      #ansible.builtin.assert:
      assert:
        fail_msg: test1 failed
        that:
          - result.changed | bool
          - result.broker['BrokerId'] == broker_id
          - result.configuration['id'] == result.broker['Configurations']['Pending']['Id']
          - result.configuration['revision'] == result.broker['Configurations']['Pending']['Revision']
      when: not ansible_check_mode
    - name: test 1a - send same config again
      # amazon.aws.mq_broker:
      mq_broker_config:
        broker_id: "{{ broker_id }}"
        config_xml: "{{ lookup('file', '../files/broker_cfg.1.xml')}}"
      register: result
    - name: verify test1a
      #ansible.builtin.assert:
      assert:
        fail_msg: test1a failed
        that:
        - not (result.changed | bool )
      when: not ansible_check_mode
    - name: test 2 - send (almost) same config again - differs by whitespace
      # amazon.aws.mq_broker_info:
      mq_broker_config:
        broker_id: "{{ broker_id }}"
        config_xml: "{{ lookup('file', '../files/broker_cfg.1a.xml')}}"
      register: result
    - name: verify test2
      #ansible.builtin.assert:
      assert:
        fail_msg: test2 failed
        that:
          - not (result.changed | bool )
      when: not ansible_check_mode
    - name: test 3 - send new config with custom description and request reboot
      # amazon.aws.mq_broker_info:
      mq_broker_config:
        broker_id: "{{ broker_id }}"
        config_xml: "{{ lookup('file', '../files/broker_cfg.2.xml')}}"
        config_description: "test 3 used custom description"
        reboot: true
      register: result
    - name: verify test3
      #ansible.builtin.assert:
      assert:
        fail_msg: test3 failed
        that:
          - result.changed | bool
          - result.broker['BrokerState'] == 'REBOOT_IN_PROGRESS'
      when: not ansible_check_mode
    - name: wait for reboot
      # amazon.aws.mq_broker_info:
      mq_broker_info:
        broker_id:      "{{ broker_id }}"
      register: result
      until: result.broker['BrokerState'] == 'RUNNING'
      retries: 15
      delay:   60
      when: not ansible_check_mode
    - name: test 3a - send new config again
      # amazon.aws.mq_broker_info:
      mq_broker_config:
        broker_id: "{{ broker_id }}"
        config_xml: "{{ lookup('file', '../files/broker_cfg.2.xml')}}"
        config_description: "test 3 used custom description"
        reboot: true
      register: result
    - name: verify test3a
      #ansible.builtin.assert:
      assert:
        fail_msg: test3a failed
        that:
        - not (result.changed | bool )
      when: not ansible_check_mode
    # Note: currently there's no way to delete a broker configuration (version)
    always:
    - name: cleanup broker
      # amazon.aws.mq_broker:
      mq_broker:
        broker_name: "{{ broker_name }}"
        state: "absent"
      register: result
