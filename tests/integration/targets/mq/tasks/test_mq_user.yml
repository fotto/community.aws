---
- name: MQ User test suite
  hosts: dummy
  gather_facts: false
  module_defaults:
    mq_broker:
      aws_access_key: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
      aws_secret_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
      security_token: "{{ lookup('env', 'AWS_SESSION_TOKEN') | default('omit') }}"
      aws_region: "{{ lookup('env', 'AWS_REGION') }}"
    mq_broker_info:
      aws_access_key: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
      aws_secret_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
      security_token: "{{ lookup('env', 'AWS_SESSION_TOKEN') | default('omit') }}"
      aws_region: "{{ lookup('env', 'AWS_REGION') }}"
    mq_user:
      aws_access_key: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
      aws_secret_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
      security_token: "{{ lookup('env', 'AWS_SESSION_TOKEN') | default('omit') }}"
      aws_region: "{{ lookup('env', 'AWS_REGION') }}"
  vars:
    broker_name: "{{ lookup('env', 'MQ_BROKER_NAME') }}"
    broker_sg_ids: "{{ lookup('env', 'MQ_SG_IDS') | default('') }}"
    broker_subnet_ids: "{{ lookup('env', 'MQ_SUBNET_IDS') | default('') }}"
    usernames:
      - "test_user1"
      - "test_user2"
      - "test_user3"

  tasks:
  - block:
    - name: show env
      debug:
        msg: "Will run tests against broker '{{ broker_name }}'"
    - name: create broker for user info tests
      # amazon.aws.mq_broker:
      mq_broker:
        broker_name: "{{ broker_name }}"
        security_groups: "{{ broker_sg_ids.split(',') }}"
        subnet_ids: "{{ broker_subnet_ids.split(',') }}"
      register: result
    - set_fact:
        broker_id: "{{ result.broker['BrokerId'] }}"
    - debug:
        msg: "Wait until broker {{ broker_name }} ({{ broker_id }}) enters running state. This may take several minutes"
    - name: wait for startup
      # amazon.aws.mq_broker_info:
      mq_broker_info:
        broker_id:      "{{ broker_id }}"
      register: result
      until: result.broker['BrokerState'] == 'RUNNING'
      retries: 15
      delay:   60
      when: not ansible_check_mode
    - name: test1 - create user with default settings
      # amazon.aws.mq_user:
      mq_user:
        broker_id: "{{ broker_id }}"
        username: "{{ usernames[0] }}"
      register: result
    - name: test1 - verify
      #ansible.builtin.assert:
      assert:
        fail_msg: test1 failed
        that:
          - result.changed | bool
          - result.user['Username'] == usernames[0]
          - not (result.user['Pending']['ConsoleAccess'] | bool)
          - result.user['Pending']['Groups'] | length == 0
      when: not ansible_check_mode
    - name: test2 - create user with console access and group list
      # amazon.aws.mq_user:
      mq_user:
        state: present
        broker_id: "{{ broker_id }}"
        username: "{{ usernames[1] }}"
        console_access: true
        groups: [ "g1", "g2" ]
      register: result
    - name: test2 - verify
      #ansible.builtin.assert:
      assert:
        fail_msg: test2 failed
        that:
          - result.changed | bool
          - result.user['Username'] == usernames[1]
          - result.user['Pending']['ConsoleAccess'] | bool
          - result.user['Pending']['Groups'] | length == 2
      when: not ansible_check_mode
    - name: test3 - create user with defined password
      # amazon.aws.mq_user:
      mq_user:
        broker_id: "{{ broker_id }}"
        username: "{{ usernames[2] }}"
        password: "09234092jzxkjvjk23kn23qn5lk34"
      register: result
    - name: test3 - verify
      #ansible.builtin.assert:
      assert:
        fail_msg: test3 failed
        that:
          - result.changed | bool
          - result.user['Username'] == usernames[2]
          - not (result.user['Pending']['ConsoleAccess'] | bool)
          - result.user['Pending']['Groups'] | length == 0
      when: not ansible_check_mode
    - name: test4 - update user password - ignore mode
      # amazon.aws.mq_user:
      mq_user:
        broker_id: "{{ broker_id }}"
        username: "{{ usernames[2] }}"
        password: "new_password_ignored"
      register: result
    - name: test4 - verify
      #ansible.builtin.assert:
      assert:
        fail_msg: test4 failed
        that:
          - not (result.changed | bool)
      when: not ansible_check_mode
    - name: test5 - update user password - force mode
      # amazon.aws.mq_user:
      mq_user:
        broker_id: "{{ broker_id }}"
        username: "{{ usernames[2] }}"
        password: "new_Password_Accepted0815%"
        allow_pw_update: true
      register: result
    - name: test5 - verify
      #ansible.builtin.assert:
      assert:
        fail_msg: test5 failed
        that:
          - result.changed | bool
      when: not ansible_check_mode
    - name: test6 - update console access - same value
      # amazon.aws.mq_user:
      mq_user:
        broker_id: "{{ broker_id }}"
        username: "{{ usernames[2] }}"
        console_access: false
      register: result
    - name: test6 - verify
      #ansible.builtin.assert:
      assert:
        fail_msg: test6 failed
        that:
          - not (result.changed | bool)
      when: not ansible_check_mode
    - name: test7 - update console access - new value
      # amazon.aws.mq_user:
      mq_user:
        broker_id: "{{ broker_id }}"
        username: "{{ usernames[1] }}"
        console_access: false
      register: result
    - name: test7 - verify
      #ansible.builtin.assert:
      assert:
        fail_msg: test7 failed
        that:
          - result.changed | bool
          - not( result.user['Pending']['ConsoleAccess'] | bool )
          - result.user['Pending']['Groups'] | length == 2
      when: not ansible_check_mode
    - name: test8 - update group list - same list but different order
      # amazon.aws.mq_user:
      mq_user:
        broker_id: "{{ broker_id }}"
        username: "{{ usernames[1] }}"
        groups: [ "g2", "g1" ]
      register: result
    - name: test8 - verify
      #ansible.builtin.assert:
      assert:
        fail_msg: test8 failed
        that:
          - not (result.changed | bool)
      when: not ansible_check_mode
    - name: test9 - update group list - add element
      # amazon.aws.mq_user:
      mq_user:
        broker_id: "{{ broker_id }}"
        username: "{{ usernames[1] }}"
        groups: [ "g2", "g1", "g3" ]
      register: result
    - name: test9 - verify
      #ansible.builtin.assert:
      assert:
        fail_msg: test9 failed
        that:
          - result.changed | bool
          - result.user['Pending']['Groups'] | length == 3
      when: not ansible_check_mode
    - name: test10 - update group list - remove element
      # amazon.aws.mq_user:
      mq_user:
        broker_id: "{{ broker_id }}"
        username: "{{ usernames[1] }}"
        groups: [ "g2", "g3" ]
      register: result
    - name: test10 - verify
      #ansible.builtin.assert:
      assert:
        fail_msg: test10 failed
        that:
          - result.changed | bool
          - result.user['Pending']['Groups'] | length == 2
      when: not ansible_check_mode
    - name: test11 - update group list - set to empty list
      # amazon.aws.mq_user:
      mq_user:
        broker_id: "{{ broker_id }}"
        username: "{{ usernames[1] }}"
        groups: []
      register: result
    - name: test11 - verify
      #ansible.builtin.assert:
      assert:
        fail_msg: test11 failed
        that:
          - result.changed | bool
          - result.user['Pending']['Groups'] | length == 0
      when: not ansible_check_mode
    - name: delete all users
      # amazon.aws.mq_user:
      mq_user:
        state: absent
        broker_id: "{{ broker_id }}"
        username: "{{ item }}"
      loop: "{{ usernames | flatten(levels=1) }}"
    - name: test13 - delete deleted user
      # amazon.aws.mq_user:
      mq_user:
        state: absent
        broker_id: "{{ broker_id }}"
        username: "{{ usernames[1] }}"
      register: result
    - name: test13 - verify
      #ansible.builtin.assert:
      assert:
        fail_msg: test13 failed
        that:
          - not(result.changed | bool)
      when: not ansible_check_mode
    always:
    - name: cleanup broker
      # amazon.aws.mq_broker:
      mq_broker:
        broker_name: "{{ broker_name }}"
        state: "absent"
      register: result
