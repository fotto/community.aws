---
- name: MQ User test suite
  hosts: dummy
  gather_facts: false
  module_defaults:
    mq_broker:
      aws_access_key: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
      aws_secret_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
      security_token: "{{ lookup('env', 'AWS_SESSION_TOKEN') | default('omit') }}"
      aws_region: "{{ lookup('env', 'AWS_REGION') }}"
    mq_broker_info:
      aws_access_key: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
      aws_secret_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
      security_token: "{{ lookup('env', 'AWS_SESSION_TOKEN') | default('omit') }}"
      aws_region: "{{ lookup('env', 'AWS_REGION') }}"
    mq_user:
      aws_access_key: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
      aws_secret_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
      security_token: "{{ lookup('env', 'AWS_SESSION_TOKEN') | default('omit') }}"
      aws_region: "{{ lookup('env', 'AWS_REGION') }}"
    mq_user_info:
      aws_access_key: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
      aws_secret_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
      security_token: "{{ lookup('env', 'AWS_SESSION_TOKEN') | default('omit') }}"
      aws_region: "{{ lookup('env', 'AWS_REGION') }}"
  vars:
    broker_name: "{{ lookup('env', 'MQ_BROKER_NAME') }}"
    broker_sg_ids: "{{ lookup('env', 'MQ_SG_IDS') | default('') }}"
    broker_subnet_ids: "{{ lookup('env', 'MQ_SUBNET_IDS') | default('') }}"
    create_users:
      - "info_user1"
      - "info_user2"
      - "info_user3"
      - "info_user4"
      - "info_user5"
    delete_users:
      - "info_user2"
      - "info_user5"

  tasks:
  - block:
    - name: show env
      debug:
        msg: "Will run tests against broker '{{ broker_name }}'"
    - name: create broker for user info tests
      # amazon.aws.mq_broker:
      mq_broker:
        broker_name: "{{ broker_name }}"
        security_groups: "{{ broker_sg_ids.split(',') }}"
        subnet_ids: "{{ broker_subnet_ids.split(',') }}"
      register: result
    - set_fact:
        broker_id: "{{ result.broker['BrokerId'] }}"
    - debug:
        msg: "Wait until broker {{ broker_name }} ({{ broker_id }}) enters running state. This may take several minutes"
    - name: wait for startup
      # amazon.aws.mq_broker_info:
      mq_broker_info:
        broker_id:      "{{ broker_id }}"
      register: result
      until: result.broker['BrokerState'] == 'RUNNING'
      retries: 15
      delay:   60
      when: not ansible_check_mode
    - name: prepare tests - create users
      # amazon.aws.mq_user:
      mq_user:
        state: present
        broker_id: "{{ broker_id }}"
        username: "{{ item }}"
      loop: "{{ create_users | flatten(levels=1) }}"
    - name: prepare tests - delete users
      # amazon.aws.mq_user:
      mq_user:
        state: absent
        broker_id: "{{ broker_id }}"
        username: "{{ item }}"
      loop: "{{ delete_users | flatten(levels=1) }}"
    - name: test2 - list all users
      # amazon.aws.mq_user_info:
      mq_user_info:
        broker_id: "{{ broker_id }}"
      register: result
    - name: test2 - verify
      #ansible.builtin.assert:
      assert:
        fail_msg: test2 failed
        that:
          - result.users['info_user1']
          - result.users['info_user2']
          - result.users['info_user3']
      when: not ansible_check_mode
    - name: test3 - list only user currently being active until next broker reboot
      # amazon.aws.mq_user_info:
      mq_user_info:
        broker_id: "{{ broker_id }}"
        skip_pending_create: true
      register: result
    - name: test3 - verify
      #ansible.builtin.assert:
      assert:
        fail_msg: test3 failed
        that:
          - not ('info_user1' in result.users)
          - result.users['info_user2']
          - not ('info_user3' in result.users)
          - not ('info_user4' in result.users)
          - result.users['info_user5']
      when: not ansible_check_mode
    - name: test4 - list only user that will be active after next broker reboot
      # amazon.aws.mq_user_info:
      mq_user_info:
        broker_id: "{{ broker_id }}"
        skip_pending_delete: true
      register: result
    - name: test4 - verify
      #ansible.builtin.assert:
      assert:
        fail_msg: test4 failed
        that:
          - result.users['info_user1']
          - not ('info_user2' in result.users)
          - result.users['info_user3']
          - result.users['info_user4']
          - not ('info_user5' in result.users)
      when: not ansible_check_mode
    always:
    - name: cleanup broker
      # amazon.aws.mq_broker:
      mq_broker:
        broker_name: "{{ broker_name }}"
        state: "absent"
      register: result
